<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban — Mis Prioridades</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0e0e0d;
  color: #d3d1c7;
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  border-bottom: 0.5px solid #252523;
  background: #111110;
  flex-wrap: wrap;
}

.logo {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #5f5e5a;
  flex-shrink: 0;
}

.logo span { color: #888780; }

.search-box {
  flex: 1;
  min-width: 140px;
  max-width: 200px;
  background: #1a1a18;
  border: 0.5px solid #2c2c2a;
  border-radius: 4px;
  padding: 5px 10px;
  font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
  color: #888780;
  outline: none;
}
.search-box::placeholder { color: #444441; }
.search-box:focus { border-color: #444441; }

.brand-sel {
  background: #1a1a18;
  border: 0.5px solid #2c2c2a;
  border-radius: 4px;
  padding: 5px 8px;
  font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
  color: #888780;
  outline: none;
  cursor: pointer;
}

.hbtn {
  background: #1a1a18;
  border: 0.5px solid #2c2c2a;
  border-radius: 4px;
  padding: 5px 10px;
  font-size: 10px;
  font-family: 'IBM Plex Mono', monospace;
  color: #5f5e5a;
  cursor: pointer;
  letter-spacing: 0.06em;
  white-space: nowrap;
  transition: all 0.15s;
}
.hbtn:hover { color: #888780; border-color: #444441; }
.hbtn.on { color: #9FE1CB; border-color: #1D9E7540; background: #0d2820; }

.header-right { display: flex; gap: 6px; align-items: center; margin-left: auto; }

.summary { font-size: 10px; color: #2c2c2a; letter-spacing: 0.06em; }
.summary span { color: #444441; }

/* ── Board ── */
.board {
  display: flex;
  gap: 12px;
  padding: 20px;
  overflow-x: auto;
  min-height: calc(100vh - 52px);
  align-items: flex-start;
}

/* ── Column ── */
.col { flex: 1 1 0; min-width: 150px; }

.col-head {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 12px;
  padding: 0 6px;
}

.col-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.col-name { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: #5f5e5a; flex: 1; }
.col-count { font-size: 10px; color: #444441; }

.col-actions-row { display: flex; gap: 6px; align-items: center; }

.col-add-btn {
  width: 22px; height: 22px;
  background: none; border: 0.5px solid #333331;
  border-radius: 3px; cursor: pointer;
  color: #444441; font-size: 17px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.col-add-btn:hover { color: #aaa8a0; border-color: #5f5e5a; }

.col-archive-btn {
  background: none; border: none; cursor: pointer;
  font-size: 10px; letter-spacing: 0.06em;
  color: #333331; padding: 0;
  transition: color 0.15s;
}
.col-archive-btn:hover { color: #3B6D11; }

.cards { display: flex; flex-direction: column; gap: 10px; padding: 0 6px; }

/* ── Card (glass) ── */
.card {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 14px 16px;
  position: relative;
  cursor: grab;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
}
.card:active { cursor: grabbing; }
.card:hover {
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.14);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 10;
}
.card.dragging { opacity: 0.35; }
.card.done-card { opacity: 0.45; border-style: dashed; }

/* Brand accent — colored top border + hover glow */
.card.byd      { border-top: 2px solid #1D9E75; }
.card.byd:hover      { box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 28px rgba(29,158,117,0.18); }
.card.bmw      { border-top: 2px solid #378ADD; }
.card.bmw:hover      { box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 28px rgba(55,138,221,0.18); }
.card.mini     { border-top: 2px solid #BA7517; }
.card.mini:hover     { box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 28px rgba(186,117,23,0.18); }
.card.motorrad { border-top: 2px solid #D85A30; }
.card.motorrad:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 28px rgba(216,90,48,0.18); }
.card.personal { border-top: 2px solid #5f5e5a; }

/* Card content */
.card-brand {
  font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
  font-weight: 600; margin-bottom: 6px; white-space: nowrap; overflow: hidden;
}
.card.byd .card-brand      { color: #2DC98F; }
.card.bmw .card-brand      { color: #5AAAE8; }
.card.mini .card-brand     { color: #D49030; }
.card.motorrad .card-brand { color: #E8754A; }
.card.personal .card-brand { color: #888780; }

.card-text {
  font-size: 14px; line-height: 1.45;
  color: #e8e6dc; margin-bottom: 10px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

.card-meta { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }

.cbadge {
  font-size: 10px; padding: 2px 8px; border-radius: 20px;
  font-family: 'IBM Plex Mono', monospace; font-weight: 500;
  border: 1px solid; cursor: default; line-height: 1.5; white-space: nowrap;
}
.cbadge.alta     { background: rgba(220,50,50,0.15);  color: #FFB3B3; border-color: rgba(220,50,50,0.3); }
.cbadge.media    { background: rgba(200,140,20,0.15); color: #FFD8A0; border-color: rgba(200,140,20,0.3); }
.cbadge.baja     { background: rgba(50,160,80,0.15);  color: #A8EFC8; border-color: rgba(50,160,80,0.3); }
.cbadge.date     { background: rgba(255,255,255,0.05); color: #666460; border-color: rgba(255,255,255,0.08); }
.cbadge.date.overdue { color: #FFB3B3; border-color: rgba(220,50,50,0.35); }
.cbadge.wait-pending { background: rgba(110,90,220,0.15); color: #C4BFFF; border-color: rgba(110,90,220,0.3); cursor: pointer; }
.cbadge.wait-sent    { background: rgba(50,160,80,0.15);  color: #A8EFC8; border-color: rgba(50,160,80,0.3);  cursor: pointer; }

/* Card action buttons */
.card-btns {
  position: absolute; top: 10px; right: 12px;
  display: flex; gap: 4px;
  opacity: 0; transition: opacity 0.15s; z-index: 5;
}
.card:hover .card-btns { opacity: 1; }
.cbtn {
  width: 22px; height: 22px;
  background: rgba(20,20,18,0.8);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; cursor: pointer; color: #666460;
  font-size: 11px; display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
}
.cbtn:hover { color: #d3d1c7; border-color: rgba(255,255,255,0.2); }
.cbtn.del:hover { color: #FFB3B3; }

/* ── Add form ── */
.add-form {
  display: none;
  background: rgba(255,255,255,0.03);
  border: 1px dashed rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 12px;
}
.add-form.open { display: block; }

.add-form textarea {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
  padding: 8px 10px; font-size: 13px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #e8e6dc; outline: none; resize: none; line-height: 1.4;
}
.add-form textarea:focus { border-color: rgba(255,255,255,0.18); }
.add-form textarea::placeholder { color: #2c2c2a; font-family: 'IBM Plex Mono', monospace; }

.add-form select, .add-form input[type="date"], .add-form input[type="text"] {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  padding: 6px 9px; font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
  color: #888780; outline: none; cursor: pointer;
  margin-top: 6px;
}
.add-form select:focus, .add-form input:focus { border-color: rgba(255,255,255,0.2); }

.form-row { display: flex; gap: 5px; margin-top: 6px; }
.form-row select { margin-top: 0; }

.form-btns { display: flex; gap: 5px; margin-top: 8px; }
.fbtn-ok {
  flex: 1; padding: 7px; background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
  font-size: 11px; font-family: 'IBM Plex Mono', monospace;
  color: #aaa8a0; cursor: pointer; letter-spacing: 0.06em;
  transition: all 0.12s;
}
.fbtn-ok:hover { background: rgba(255,255,255,0.12); color: #e8e6dc; }

.fbtn-cancel {
  padding: 7px 12px; background: none;
  border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
  font-size: 11px; font-family: 'IBM Plex Mono', monospace;
  color: #444441; cursor: pointer; transition: all 0.12s;
}
.fbtn-cancel:hover { color: #888780; }

/* ── Inline edit ── */
.c-edit-wrap {
  position: absolute; inset: 0;
  background: #181816;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.14);
  padding: 12px;
  display: flex; flex-direction: column; gap: 6px;
  z-index: 30;
}
.c-edit-wrap textarea {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  padding: 7px 9px; font-size: 13px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #e8e6dc; outline: none; resize: none; flex: 1;
}
.c-edit-wrap textarea:focus { border-color: rgba(255,255,255,0.22); }
.c-edit-row { display: flex; gap: 5px; }
.c-edit-sel {
  flex: 1; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
  padding: 5px 6px; font-size: 10px;
  font-family: 'IBM Plex Mono', monospace;
  color: #888780; outline: none; cursor: pointer;
}
.c-edit-date {
  flex: 1; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
  padding: 5px 6px; font-size: 10px;
  font-family: 'IBM Plex Mono', monospace;
  color: #888780; outline: none;
}
.c-edit-assignee {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
  padding: 5px 9px; font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
  color: #888780; outline: none;
}
.c-edit-assignee::placeholder { color: #333331; }
.c-edit-btns { display: flex; gap: 5px; }
.c-edit-save {
  flex: 1; background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
  font-size: 10px; font-family: 'IBM Plex Mono', monospace;
  color: #aaa8a0; cursor: pointer; padding: 5px;
  transition: all 0.12s;
}
.c-edit-save:hover { background: rgba(255,255,255,0.12); color: #e8e6dc; }
.c-edit-cancel {
  background: none; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px;
  font-size: 10px; font-family: 'IBM Plex Mono', monospace;
  color: #444441; cursor: pointer; padding: 5px 10px;
}

/* ── Drop zone highlight ── */
.col.drag-over .cards { outline: 1px dashed #444441; border-radius: 4px; outline-offset: 4px; }

/* ── Empty state ── */
.empty { font-size: 9px; color: #252523; letter-spacing: 0.1em; text-align: center; padding: 10px 0; }

/* ── Settings modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #161614; border: 0.5px solid #2c2c2a;
  border-radius: 6px; padding: 20px; width: 340px;
  font-family: 'IBM Plex Mono', monospace;
}
.modal h2 { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #5f5e5a; margin-bottom: 14px; }
.modal label { display: block; font-size: 9px; color: #5f5e5a; letter-spacing: 0.1em; margin-bottom: 4px; text-transform: uppercase; }
.modal input[type="text"], .modal input[type="password"] {
  width: 100%; background: #1a1a18; border: 0.5px solid #2c2c2a;
  border-radius: 3px; padding: 6px 8px; font-size: 11px;
  font-family: 'IBM Plex Mono', monospace; color: #d3d1c7; outline: none;
  margin-bottom: 12px;
}
.modal input:focus { border-color: #5f5e5a; }
.modal-note { font-size: 9px; color: #444441; line-height: 1.6; margin-bottom: 14px; }
.modal-note a { color: #888780; }
.modal-btns { display: flex; gap: 6px; }
.mbtn-save {
  flex: 1; padding: 7px; background: #252523;
  border: 0.5px solid #5f5e5a; border-radius: 3px;
  font-size: 10px; font-family: 'IBM Plex Mono', monospace;
  color: #888780; cursor: pointer; letter-spacing: 0.08em;
  transition: all 0.12s;
}
.mbtn-save:hover { color: #d3d1c7; border-color: #888780; }
.mbtn-cancel {
  padding: 7px 12px; background: none;
  border: 0.5px solid #2c2c2a; border-radius: 3px;
  font-size: 10px; font-family: 'IBM Plex Mono', monospace;
  color: #444441; cursor: pointer;
}
.gh-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #2c2c2a; flex-shrink: 0;
  transition: background 0.3s;
}
.gh-dot.ok { background: #3B6D11; }
.gh-dot.err { background: #8B2020; }
.save-status { font-size: 9px; color: #2c2c2a; letter-spacing: 0.06em; transition: color 0.3s; }
.save-status.saving { color: #5f5e5a; }
.save-status.saved { color: #3B6D11; }
.save-status.error { color: #8B2020; }
</style>
</head>
<body>

<header>
  <div class="logo">mis <span>prioridades</span></div>
  <input class="search-box" id="search" type="text" placeholder="buscar...">
  <select class="brand-sel" id="brand-filter">
    <option value="">todas las marcas</option>
    <option value="BYD">BYD</option>
    <option value="BMW">BMW</option>
    <option value="MINI">MINI</option>
    <option value="MOTORRAD">MOTORRAD</option>
    <option value="PERSONAL">PERSONAL</option>
  </select>
  <div class="header-right">
    <div class="gh-dot" id="gh-dot" title="GitHub sync"></div>
    <div class="save-status" id="save-status"></div>
    <button class="hbtn" id="toggle-archived">ver archivadas</button>
    <button class="hbtn" id="settings-btn">⚙</button>
    <div class="summary" id="summary">—</div>
  </div>
</header>

<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>GitHub Sync</h2>
    <label>Personal Access Token</label>
    <input type="password" id="gh-token" placeholder="ghp_...">
    <p class="modal-note">
      Crea un token en <strong>github.com → Settings → Developer settings → Personal access tokens → Fine-grained</strong> con permiso <strong>Contents: Read &amp; Write</strong> sobre este repo.<br><br>
      El token se guarda solo en este navegador (localStorage).
    </p>
    <div class="modal-btns">
      <button class="mbtn-save" id="modal-save">Guardar</button>
      <button class="mbtn-cancel" id="modal-cancel">Cancelar</button>
    </div>
  </div>
</div>

<div class="board">

  <div class="col" data-col="todo">
    <div class="col-head">
      <div class="col-dot" style="background:#185FA5"></div>
      <div class="col-name">por hacer</div>
      <div class="col-actions-row">
        <div class="col-count" data-count="todo">0</div>
        <button class="col-add-btn" data-target="todo">+</button>
      </div>
    </div>
    <div class="cards" id="cards-todo"></div>
    <div class="add-form" id="form-todo">
      <textarea id="text-todo" rows="2" placeholder="nueva tarea..."></textarea>
      <div class="form-row">
        <select id="brand-todo"><option value="">sin marca</option><option value="BYD">BYD</option><option value="BMW">BMW</option><option value="MINI">MINI</option><option value="MOTORRAD">MOTORRAD</option><option value="PERSONAL">PERSONAL</option></select>
        <select id="priority-todo"><option value="">prioridad</option><option value="alta">🔴 alta</option><option value="media">🟡 media</option><option value="baja">🟢 baja</option></select>
      </div>
      <input type="date" id="date-todo">
      <div class="form-btns">
        <button class="fbtn-ok" data-add="todo">agregar</button>
        <button class="fbtn-cancel" data-close="todo">✕</button>
      </div>
    </div>
  </div>

  <div class="col" data-col="boga">
    <div class="col-head">
      <div class="col-dot" style="background:#993C1D"></div>
      <div class="col-name">en boga</div>
      <div class="col-actions-row">
        <div class="col-count" data-count="boga">0</div>
        <button class="col-add-btn" data-target="boga">+</button>
      </div>
    </div>
    <div class="cards" id="cards-boga"></div>
    <div class="add-form" id="form-boga">
      <textarea id="text-boga" rows="2" placeholder="tarea de hoy..."></textarea>
      <div class="form-row">
        <select id="brand-boga"><option value="">sin marca</option><option value="BYD">BYD</option><option value="BMW">BMW</option><option value="MINI">MINI</option><option value="MOTORRAD">MOTORRAD</option><option value="PERSONAL">PERSONAL</option></select>
        <select id="priority-boga"><option value="">prioridad</option><option value="alta">🔴 alta</option><option value="media">🟡 media</option><option value="baja">🟢 baja</option></select>
      </div>
      <input type="date" id="date-boga">
      <div class="form-btns">
        <button class="fbtn-ok" data-add="boga">agregar</button>
        <button class="fbtn-cancel" data-close="boga">✕</button>
      </div>
    </div>
  </div>

  <div class="col" data-col="progress">
    <div class="col-head">
      <div class="col-dot" style="background:#BA7517"></div>
      <div class="col-name">en progreso</div>
      <div class="col-actions-row">
        <div class="col-count" data-count="progress">0</div>
        <button class="col-add-btn" data-target="progress">+</button>
      </div>
    </div>
    <div class="cards" id="cards-progress"></div>
    <div class="add-form" id="form-progress">
      <textarea id="text-progress" rows="2" placeholder="nueva tarea..."></textarea>
      <div class="form-row">
        <select id="brand-progress"><option value="">sin marca</option><option value="BYD">BYD</option><option value="BMW">BMW</option><option value="MINI">MINI</option><option value="MOTORRAD">MOTORRAD</option><option value="PERSONAL">PERSONAL</option></select>
        <select id="priority-progress"><option value="">prioridad</option><option value="alta">🔴 alta</option><option value="media">🟡 media</option><option value="baja">🟢 baja</option></select>
      </div>
      <input type="date" id="date-progress">
      <div class="form-btns">
        <button class="fbtn-ok" data-add="progress">agregar</button>
        <button class="fbtn-cancel" data-close="progress">✕</button>
      </div>
    </div>
  </div>

  <div class="col" data-col="waiting">
    <div class="col-head">
      <div class="col-dot" style="background:#534AB7"></div>
      <div class="col-name">esperando</div>
      <div class="col-actions-row">
        <div class="col-count" data-count="waiting">0</div>
        <button class="col-add-btn" data-target="waiting">+</button>
      </div>
    </div>
    <div class="cards" id="cards-waiting"></div>
    <div class="add-form" id="form-waiting">
      <textarea id="text-waiting" rows="2" placeholder="¿qué estás esperando?"></textarea>
      <input type="text" id="assignee-waiting" placeholder="¿quién lo tiene?" style="width:100%;background:#1a1a18;border:0.5px solid #2c2c2a;border-radius:3px;padding:4px 6px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:#888780;outline:none;margin-top:5px;">
      <div class="form-row">
        <select id="brand-waiting"><option value="">sin marca</option><option value="BYD">BYD</option><option value="BMW">BMW</option><option value="MINI">MINI</option><option value="MOTORRAD">MOTORRAD</option><option value="PERSONAL">PERSONAL</option></select>
        <select id="priority-waiting"><option value="">prioridad</option><option value="alta">🔴 alta</option><option value="media">🟡 media</option><option value="baja">🟢 baja</option></select>
      </div>
      <input type="date" id="date-waiting">
      <div class="form-btns">
        <button class="fbtn-ok" data-add="waiting">agregar</button>
        <button class="fbtn-cancel" data-close="waiting">✕</button>
      </div>
    </div>
  </div>

  <div class="col" data-col="done">
    <div class="col-head">
      <div class="col-dot" style="background:#3B6D11"></div>
      <div class="col-name">hecho</div>
      <div class="col-actions-row">
        <div class="col-count" data-count="done">0</div>
        <button class="col-archive-btn" data-archive-col="done">archivar todo</button>
        <button class="col-add-btn" data-target="done">+</button>
      </div>
    </div>
    <div class="cards" id="cards-done"></div>
    <div class="add-form" id="form-done">
      <textarea id="text-done" rows="2" placeholder="nueva tarea..."></textarea>
      <div class="form-row">
        <select id="brand-done"><option value="">sin marca</option><option value="BYD">BYD</option><option value="BMW">BMW</option><option value="MINI">MINI</option><option value="MOTORRAD">MOTORRAD</option><option value="PERSONAL">PERSONAL</option></select>
        <select id="priority-done"><option value="">prioridad</option><option value="alta">🔴 alta</option><option value="media">🟡 media</option><option value="baja">🟢 baja</option></select>
      </div>
      <input type="date" id="date-done">
      <div class="form-btns">
        <button class="fbtn-ok" data-add="done">agregar</button>
        <button class="fbtn-cancel" data-close="done">✕</button>
      </div>
    </div>
  </div>

</div>

<script>
const COLS = ['todo','boga','progress','waiting','done'];
const PRIO = { alta:0, media:1, baja:2, '':3 };
const BRAND_CLASS = { BYD:'byd', BMW:'bmw', MINI:'mini', MOTORRAD:'motorrad', PERSONAL:'personal', '':'personal' };

const GH = {
  owner: 'arternauta',
  repo:  'kanban',
  path:  'tasks.json',
  get token() { return localStorage.getItem('gh_token') || ''; },
  get isPages() { return location.hostname !== 'localhost' && location.hostname !== '127.0.0.1'; }
};

let tasks = [], saveTimer = null, showArchived = false, searchQ = '', brandF = '';
let ghSha = null; // current SHA of tasks.json in GitHub

function setStatus(state, text) {
  const dot = document.getElementById('gh-dot');
  const st  = document.getElementById('save-status');
  if (dot) { dot.className = 'gh-dot' + (state === 'ok' ? ' ok' : state === 'err' ? ' err' : ''); }
  if (st)  { st.textContent = text; st.className = 'save-status' + (state ? ' ' + state : ''); }
}

async function ghGet() {
  const r = await fetch(
    `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}`,
    { headers: { Authorization: `Bearer ${GH.token}`, Accept: 'application/vnd.github+json' } }
  );
  if (!r.ok) throw new Error(r.status);
  const data = await r.json();
  ghSha = data.sha;
  return JSON.parse(atob(data.content.replace(/\n/g, '')));
}

async function ghPut(content) {
  const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));
  const r = await fetch(
    `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}`,
    {
      method: 'PUT',
      headers: { Authorization: `Bearer ${GH.token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Update tasks', content: b64, sha: ghSha })
    }
  );
  if (!r.ok) throw new Error(r.status);
  const data = await r.json();
  ghSha = data.content.sha;
}

async function load() {
  try {
    if (GH.token) {
      tasks = await ghGet();
      setStatus('ok', '');
    } else if (!GH.isPages) {
      const r = await fetch('/api/tasks');
      tasks = await r.json();
    } else {
      tasks = [];
      setStatus('err', 'sin token');
    }
  } catch(e) {
    tasks = [];
    setStatus('err', 'error');
  }
  render();
}

function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      if (GH.token) {
        setStatus('', 'guardando...');
        await ghPut(tasks);
        setStatus('ok', '');
      } else if (!GH.isPages) {
        await fetch('/api/tasks', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(tasks, null, 2) });
      }
    } catch(e) {
      if (String(e).includes('409') || String(e).includes('422')) {
        // SHA conflict — re-fetch and retry once
        try { tasks = await ghGet(); render(); } catch {}
      }
      setStatus('err', 'error al guardar');
    }
  }, 1200);
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function mhash(s, seed) {
  let h = seed >>> 0;
  for (let i = 0; i < s.length; i++) {
    let c = s.charCodeAt(i);
    c = Math.imul(c, 0xcc9e2d51) >>> 0;
    c = ((c << 15) | (c >>> 17)) >>> 0;
    c = Math.imul(c, 0x1b873593) >>> 0;
    h ^= c;
    h = ((h << 13) | (h >>> 19)) >>> 0;
    h = (Math.imul(h, 5) + 0xe6546b64) >>> 0;
  }
  h ^= h >>> 16; h = Math.imul(h, 0x85ebca6b) >>> 0;
  h ^= h >>> 13; h = Math.imul(h, 0xc2b2ae35) >>> 0;
  return (h ^ h >>> 16) >>> 0;
}

function rot(id) {
  return ((mhash(id, 1) % 80) - 40) / 10; // -4 to +4 deg
}

function offsetX(id) {
  return ((mhash(id, 7) >>> 27) * 24 / 31) - 12; // -12 to +12 px via translateX
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function overdue(d) { return d && new Date(d+'T23:59:59') < new Date(); }

function matches(t) {
  if (!showArchived && t.archived) return false;
  if (brandF && t.brand !== brandF) return false;
  if (searchQ && !t.text.toLowerCase().includes(searchQ.toLowerCase())) return false;
  return true;
}

function card(task) {
  const cls = BRAND_CLASS[task.brand || ''] || 'personal';
  const isDone = task.col === 'done';
  const isWaiting = task.col === 'waiting';

  const brandLabel = isWaiting && task.assignee
    ? (task.brand ? `${task.brand} · ${task.assignee}` : task.assignee)
    : (task.brand || '');

  const priBadge  = task.priority
    ? `<span class="cbadge ${esc(task.priority)}">${esc(task.priority)}</span>` : '';
  const dateBadge = task.date
    ? `<span class="cbadge date${overdue(task.date)?' overdue':''}">${fmtDate(task.date)}${overdue(task.date)?' !':''}</span>` : '';
  const waitBadge = isWaiting
    ? `<button class="cbadge wait-${task.waitStatus==='sent'?'sent':'pending'}" data-toggle-wait="${esc(task.id)}">${task.waitStatus==='sent'?'✓ enviada':'· por enviar'}</button>` : '';

  const meta = priBadge || dateBadge || waitBadge
    ? `<div class="card-meta">${priBadge}${dateBadge}${waitBadge}</div>` : '';

  return `
    <div class="card ${cls}${isDone?' done-card':''}"
         data-id="${esc(task.id)}"
         draggable="${task.archived?'false':'true'}">
      ${brandLabel ? `<div class="card-brand">${esc(brandLabel)}</div>` : ''}
      <div class="card-text" data-edit="${esc(task.id)}">${esc(task.text)}</div>
      ${meta}
      <div class="card-btns">
        <button class="cbtn" data-archive="${esc(task.id)}" title="${task.archived?'desarchivar':'archivar'}">${task.archived?'↩':'⊘'}</button>
        <button class="cbtn del" data-delete="${esc(task.id)}" title="eliminar">✕</button>
      </div>
    </div>`;
}

function render() {
  COLS.forEach(col => {
    const colTasks = tasks.filter(t => t.col === col);
    const visible = colTasks.filter(matches)
      .sort((a,b) => (PRIO[a.priority||'']??3) - (PRIO[b.priority||'']??3));

    const container = document.getElementById('cards-' + col);
    container.innerHTML = visible.length
      ? visible.map(card).join('')
      : '<div class="empty">vacío</div>';

    document.querySelector(`[data-count="${col}"]`).textContent =
      colTasks.filter(t => !t.archived).length;

    container.querySelectorAll('.card').forEach(el => {
      el.addEventListener('dragstart', onDragStart);
      el.addEventListener('dragend', onDragEnd);
    });
  });

  const active = tasks.filter(t => !t.archived);
  const done = active.filter(t => t.col === 'done').length;
  document.getElementById('summary').innerHTML =
    active.length === 0 ? '—' : `<span>${done}</span> / ${active.length}`;
}

function openEdit(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (!card) return;
  card.draggable = false;
  const isWaiting = task.col === 'waiting';
  const wrap = document.createElement('div');
  wrap.className = 'c-edit-wrap';
  wrap.innerHTML = `
    <textarea id="ei-text" rows="2">${esc(task.text)}</textarea>
    ${isWaiting ? `<input class="c-edit-assignee" id="ei-assignee" placeholder="¿quién lo tiene?" value="${esc(task.assignee||'')}">` : ''}
    <div class="c-edit-row">
      <select class="c-edit-sel" id="ei-brand">
        <option value="" ${!task.brand?'selected':''}>sin marca</option>
        <option value="BYD" ${task.brand==='BYD'?'selected':''}>BYD</option>
        <option value="BMW" ${task.brand==='BMW'?'selected':''}>BMW</option>
        <option value="MINI" ${task.brand==='MINI'?'selected':''}>MINI</option>
        <option value="MOTORRAD" ${task.brand==='MOTORRAD'?'selected':''}>MOTORRAD</option>
        <option value="PERSONAL" ${task.brand==='PERSONAL'?'selected':''}>PERSONAL</option>
      </select>
      <select class="c-edit-sel" id="ei-priority">
        <option value="" ${!task.priority?'selected':''}>—</option>
        <option value="alta" ${task.priority==='alta'?'selected':''}>🔴 alta</option>
        <option value="media" ${task.priority==='media'?'selected':''}>🟡 media</option>
        <option value="baja" ${task.priority==='baja'?'selected':''}>🟢 baja</option>
      </select>
    </div>
    <input class="c-edit-date" type="date" id="ei-date" value="${task.date||''}">
    <div class="c-edit-btns">
      <button class="c-edit-save" data-save="${esc(id)}">guardar</button>
      <button class="c-edit-cancel" data-cancel-edit>✕</button>
    </div>`;
  card.style.height = 'auto';
  card.appendChild(wrap);
  const ta = wrap.querySelector('#ei-text');
  ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length);
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSave(id); }
    if (e.key === 'Escape') render();
  });
}

function doSave(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const text = document.getElementById('ei-text')?.value.trim();
  if (!text) return;
  t.text = text;
  t.brand = document.getElementById('ei-brand')?.value || '';
  t.priority = document.getElementById('ei-priority')?.value || '';
  t.date = document.getElementById('ei-date')?.value || '';
  const ae = document.getElementById('ei-assignee');
  if (ae) t.assignee = ae.value.trim();
  save(); render();
}

function addTask(col) {
  const text = document.getElementById('text-' + col)?.value.trim();
  if (!text) return;
  const assigneeEl = document.getElementById('assignee-' + col);
  tasks.push({
    id: uid(), col, text,
    brand: document.getElementById('brand-' + col)?.value || '',
    priority: document.getElementById('priority-' + col)?.value || '',
    date: document.getElementById('date-' + col)?.value || '',
    assignee: assigneeEl ? assigneeEl.value.trim() : '',
    archived: false
  });
  save(); render(); closeForm(col);
}

function openForm(col) {
  COLS.forEach(c => document.getElementById('form-'+c)?.classList.remove('open'));
  document.getElementById('form-'+col)?.classList.add('open');
  document.getElementById('text-'+col)?.focus();
}

function closeForm(col) {
  document.getElementById('form-'+col)?.classList.remove('open');
  ['text-','brand-','priority-','date-','assignee-'].forEach(p => {
    const el = document.getElementById(p+col);
    if (el) el.value = '';
  });
}

let dragId = null;
function onDragStart(e) {
  dragId = this.dataset.id;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragId);
}
function onDragEnd() {
  this.classList.remove('dragging');
  document.querySelectorAll('.col').forEach(c => c.classList.remove('drag-over'));
}

document.querySelectorAll('.col').forEach(col => {
  col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('drag-over'); });
  col.addEventListener('dragleave', e => { if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over'); });
  col.addEventListener('drop', e => {
    e.preventDefault(); col.classList.remove('drag-over');
    const id = e.dataTransfer.getData('text/plain');
    const t = tasks.find(t => t.id === id);
    if (t) { t.col = col.dataset.col; save(); render(); }
  });
});

document.addEventListener('click', e => {
  const el = e.target;
  if (el.closest('[data-target]') && el.closest('.col-add-btn')) { openForm(el.closest('[data-target]').dataset.target); return; }
  if (el.closest('[data-close]')) { closeForm(el.closest('[data-close]').dataset.close); return; }
  if (el.closest('[data-add]')) { addTask(el.closest('[data-add]').dataset.add); return; }
  if (el.closest('[data-save]')) { doSave(el.closest('[data-save]').dataset.save); return; }
  if (el.closest('[data-cancel-edit]')) { render(); return; }
  if (el.closest('[data-delete]')) {
    tasks = tasks.filter(t => t.id !== el.closest('[data-delete]').dataset.delete);
    save(); render(); return;
  }
  if (el.closest('[data-archive]') && !el.closest('[data-archive-col]')) {
    const t = tasks.find(t => t.id === el.closest('[data-archive]').dataset.archive);
    if (t) { t.archived = !t.archived; save(); render(); } return;
  }
  if (el.closest('[data-archive-col]')) {
    const col = el.closest('[data-archive-col]').dataset.archiveCol;
    tasks.filter(t => t.col === col && !t.archived).forEach(t => t.archived = true);
    save(); render(); return;
  }
  if (el.closest('[data-toggle-wait]')) {
    const t = tasks.find(t => t.id === el.closest('[data-toggle-wait]').dataset.toggleWait);
    if (t) { t.waitStatus = t.waitStatus === 'sent' ? 'pending' : 'sent'; save(); render(); } return;
  }
});

document.addEventListener('dblclick', e => {
  const el = e.target.closest('[data-edit]');
  if (el) openEdit(el.dataset.edit);
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { COLS.forEach(c => closeForm(c)); render(); }
});

COLS.forEach(col => {
  document.getElementById('text-'+col)?.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addTask(col); }
  });
});

document.getElementById('search').addEventListener('input', e => { searchQ = e.target.value; render(); });
document.getElementById('brand-filter').addEventListener('change', e => { brandF = e.target.value; render(); });
document.getElementById('toggle-archived').addEventListener('click', function() {
  showArchived = !showArchived;
  this.classList.toggle('on', showArchived);
  this.textContent = showArchived ? 'ocultar archivadas' : 'ver archivadas';
  render();
});

// Settings modal
document.getElementById('settings-btn').addEventListener('click', () => {
  document.getElementById('gh-token').value = GH.token;
  document.getElementById('settings-modal').classList.add('open');
});
document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('settings-modal').classList.remove('open');
});
document.getElementById('settings-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});
document.getElementById('modal-save').addEventListener('click', () => {
  const tok = document.getElementById('gh-token').value.trim();
  if (tok) localStorage.setItem('gh_token', tok);
  else localStorage.removeItem('gh_token');
  document.getElementById('settings-modal').classList.remove('open');
  ghSha = null;
  load();
});

load();
</script>
</body>
</html>
