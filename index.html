<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban — Prioridades</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.2);
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #888780;
    --todo-accent: #185FA5;
    --todo-bg: #E6F1FB;
    --todo-text: #0C447C;
    --prog-accent: #BA7517;
    --prog-bg: #FAEEDA;
    --prog-text: #633806;
    --done-accent: #3B6D11;
    --done-bg: #EAF3DE;
    --done-text: #27500A;
    --danger: #E24B4A;
    --radius: 10px;
    --radius-sm: 6px;
  }

  [data-theme="dark"] {
    --bg: #1a1a18;
    --surface: #242422;
    --surface2: #2c2c2a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0ede8;
    --text2: #b4b2a9;
    --text3: #888780;
    --todo-accent: #378ADD;
    --todo-bg: #042C53;
    --todo-text: #B5D4F4;
    --prog-accent: #EF9F27;
    --prog-bg: #412402;
    --prog-text: #FAC775;
    --done-accent: #639922;
    --done-bg: #173404;
    --done-text: #C0DD97;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 1.5rem;
    border-bottom: 0.5px solid var(--border);
    background: var(--surface);
  }

  header h1 {
    font-size: 17px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  header .meta {
    font-size: 13px;
    color: var(--text3);
    margin-top: 2px;
  }

  .theme-btn {
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    cursor: pointer;
    font-size: 16px;
    color: var(--text2);
    transition: background 0.15s;
    line-height: 1;
  }
  .theme-btn:hover { background: var(--border); }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    padding: 1.25rem 1.5rem;
    align-items: start;
  }

  .column {
    background: var(--surface);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    overflow: hidden;
  }

  .column.drag-over {
    border-color: var(--border2);
    background: var(--surface2);
  }

  .col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.875rem 1rem;
    border-bottom: 0.5px solid var(--border);
  }

  .col-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
  }

  .col-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .count-badge {
    font-size: 12px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 999px;
    margin-left: 4px;
  }

  [data-col="todo"] .col-dot { background: var(--todo-accent); }
  [data-col="todo"] .count-badge { background: var(--todo-bg); color: var(--todo-text); }

  [data-col="progress"] .col-dot { background: var(--prog-accent); }
  [data-col="progress"] .count-badge { background: var(--prog-bg); color: var(--prog-text); }

  [data-col="done"] .col-dot { background: var(--done-accent); }
  [data-col="done"] .count-badge { background: var(--done-bg); color: var(--done-text); }

  .add-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 20px;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.15s;
  }
  .add-btn:hover { color: var(--text); }

  .cards {
    padding: 0.625rem;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 48px;
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.625rem 0.75rem;
    cursor: grab;
    transition: border-color 0.15s, opacity 0.15s;
    user-select: none;
  }

  .card:hover { border-color: var(--border2); }
  .card.dragging { opacity: 0.4; cursor: grabbing; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .card-text {
    font-size: 14px;
    line-height: 1.45;
    word-break: break-word;
    flex: 1;
  }

  .card-delete {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 14px;
    padding: 0;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    line-height: 1;
  }
  .card:hover .card-delete { opacity: 1; }
  .card-delete:hover { color: var(--danger); }

  .card-date {
    font-size: 11px;
    color: var(--text3);
    margin-top: 5px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-date.overdue { color: var(--danger); }

  .add-form {
    padding: 0.625rem;
    border-top: 0.5px solid var(--border);
    display: none;
  }
  .add-form.open { display: block; }

  .add-form textarea {
    width: 100%;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    resize: none;
    background: var(--surface2);
    color: var(--text);
    outline: none;
    rows: 2;
  }
  .add-form textarea:focus { border-color: var(--text3); }

  .add-form input[type="date"] {
    width: 100%;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    font-size: 12px;
    font-family: inherit;
    background: var(--surface2);
    color: var(--text2);
    outline: none;
    margin-top: 6px;
    cursor: pointer;
  }
  .add-form input[type="date"]:focus { border-color: var(--text3); }

  .form-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }

  .btn-confirm {
    flex: 1;
    padding: 7px 12px;
    background: var(--text);
    color: var(--surface);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  .btn-confirm:hover { opacity: 0.85; }

  .btn-cancel {
    padding: 7px 12px;
    background: none;
    color: var(--text2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-cancel:hover { background: var(--surface2); }

  .empty-state {
    text-align: center;
    color: var(--text3);
    font-size: 12px;
    padding: 0.5rem 0;
  }

  .drop-placeholder {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius-sm);
    height: 48px;
    background: var(--surface2);
  }

  @media (max-width: 700px) {
    .board { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>Mis prioridades</h1>
    <div class="meta" id="task-summary">cargando...</div>
  </div>
  <button class="theme-btn" id="theme-toggle" title="Cambiar tema">🌙</button>
</header>

<div class="board">
  <div class="column" data-col="todo">
    <div class="col-header">
      <div class="col-title">
        <span class="col-dot"></span>
        Por hacer
        <span class="count-badge" data-count="todo">0</span>
      </div>
      <button class="add-btn" data-target="todo" title="Agregar tarea">+</button>
    </div>
    <div class="cards" id="cards-todo"></div>
    <div class="add-form" id="form-todo">
      <textarea placeholder="Nueva tarea..." rows="2" id="text-todo"></textarea>
      <input type="date" id="date-todo">
      <div class="form-actions">
        <button class="btn-confirm" data-col="todo">Agregar</button>
        <button class="btn-cancel" data-target="todo">Cancelar</button>
      </div>
    </div>
  </div>

  <div class="column" data-col="progress">
    <div class="col-header">
      <div class="col-title">
        <span class="col-dot"></span>
        En progreso
        <span class="count-badge" data-count="progress">0</span>
      </div>
      <button class="add-btn" data-target="progress" title="Agregar tarea">+</button>
    </div>
    <div class="cards" id="cards-progress"></div>
    <div class="add-form" id="form-progress">
      <textarea placeholder="Nueva tarea..." rows="2" id="text-progress"></textarea>
      <input type="date" id="date-progress">
      <div class="form-actions">
        <button class="btn-confirm" data-col="progress">Agregar</button>
        <button class="btn-cancel" data-target="progress">Cancelar</button>
      </div>
    </div>
  </div>

  <div class="column" data-col="done">
    <div class="col-header">
      <div class="col-title">
        <span class="col-dot"></span>
        Hecho
        <span class="count-badge" data-count="done">0</span>
      </div>
      <button class="add-btn" data-target="done" title="Agregar tarea">+</button>
    </div>
    <div class="cards" id="cards-done"></div>
    <div class="add-form" id="form-done">
      <textarea placeholder="Nueva tarea..." rows="2" id="text-done"></textarea>
      <input type="date" id="date-done">
      <div class="form-actions">
        <button class="btn-confirm" data-col="done">Agregar</button>
        <button class="btn-cancel" data-target="done">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<script>
let tasks = [];
let dragSrc = null;
let saveTimer = null;
const STATUS = document.getElementById('task-summary');

async function load() {
  try {
    const res = await fetch('/api/tasks');
    tasks = await res.json();
  } catch {
    tasks = [];
  }
  render();
}

function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await fetch('/api/tasks', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(tasks, null, 2)
      });
    } catch { console.error('Error guardando'); }
  }, 400);
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function formatDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function isOverdue(d) {
  if (!d) return false;
  return new Date(d + 'T23:59:59') < new Date();
}

function render() {
  ['todo', 'progress', 'done'].forEach(col => {
    const container = document.getElementById('cards-' + col);
    const colTasks = tasks.filter(t => t.col === col);

    container.innerHTML = '';

    if (!colTasks.length) {
      container.innerHTML = '<p class="empty-state">Vacío</p>';
    } else {
      colTasks.forEach(task => {
        const card = document.createElement('div');
        card.className = 'card';
        card.draggable = true;
        card.dataset.id = task.id;

        const dateHtml = task.date
          ? `<div class="card-date ${isOverdue(task.date) ? 'overdue' : ''}">
               <svg width="10" height="10" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                 <rect x="1" y="3" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
                 <path d="M5 1v4M11 1v4M1 7h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
               </svg>
               ${formatDate(task.date)}${isOverdue(task.date) ? ' · vencida' : ''}
             </div>`
          : '';

        card.innerHTML = `
          <div class="card-top">
            <span class="card-text">${escHtml(task.text)}</span>
            <button class="card-delete" data-id="${task.id}" title="Eliminar" aria-label="Eliminar tarea">✕</button>
          </div>
          ${dateHtml}
        `;

        card.addEventListener('dragstart', onDragStart);
        card.addEventListener('dragend', onDragEnd);
        container.appendChild(card);
      });
    }

    document.querySelector('[data-count="' + col + '"]').textContent = colTasks.length;
  });

  const total = tasks.length;
  const done = tasks.filter(t => t.col === 'done').length;
  document.getElementById('task-summary').textContent =
    total === 0 ? 'Sin tareas aún' : `${done} de ${total} completada${done !== 1 ? 's' : ''}`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addTask(col) {
  const text = document.getElementById('text-' + col).value.trim();
  if (!text) return;
  const date = document.getElementById('date-' + col).value;
  tasks.push({ id: uid(), col, text, date });
  save();
  render();
  closeForm(col);
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

function openForm(col) {
  ['todo','progress','done'].forEach(c => {
    document.getElementById('form-' + c).classList.remove('open');
  });
  document.getElementById('form-' + col).classList.add('open');
  document.getElementById('text-' + col).focus();
}

function closeForm(col) {
  document.getElementById('form-' + col).classList.remove('open');
  document.getElementById('text-' + col).value = '';
  document.getElementById('date-' + col).value = '';
}

function onDragStart(e) {
  dragSrc = this;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', this.dataset.id);
}

function onDragEnd() {
  this.classList.remove('dragging');
  document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
  document.querySelectorAll('.drop-placeholder').forEach(p => p.remove());
}

document.querySelectorAll('.column').forEach(col => {
  col.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    col.classList.add('drag-over');
  });

  col.addEventListener('dragleave', e => {
    if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
  });

  col.addEventListener('drop', e => {
    e.preventDefault();
    col.classList.remove('drag-over');
    const id = e.dataTransfer.getData('text/plain');
    const task = tasks.find(t => t.id === id);
    if (task) {
      task.col = col.dataset.col;
      save();
      render();
    }
  });
});

document.addEventListener('click', e => {
  const addBtn = e.target.closest('.add-btn');
  if (addBtn) { openForm(addBtn.dataset.target); return; }

  const cancelBtn = e.target.closest('.btn-cancel');
  if (cancelBtn) { closeForm(cancelBtn.dataset.target); return; }

  const confirmBtn = e.target.closest('.btn-confirm');
  if (confirmBtn) { addTask(confirmBtn.dataset.col); return; }

  const delBtn = e.target.closest('.card-delete');
  if (delBtn) { deleteTask(delBtn.dataset.id); return; }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    ['todo','progress','done'].forEach(c => closeForm(c));
  }
});

['todo','progress','done'].forEach(col => {
  document.getElementById('text-' + col).addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      addTask(col);
    }
  });
});

const themeBtn = document.getElementById('theme-toggle');
const root = document.documentElement;
let dark = localStorage.getItem('kanban-theme') === 'dark';

function applyTheme() {
  root.dataset.theme = dark ? 'dark' : 'light';
  themeBtn.textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('kanban-theme', dark ? 'dark' : 'light');
}

themeBtn.addEventListener('click', () => { dark = !dark; applyTheme(); });

applyTheme();
load();
</script>
</body>
</html>
